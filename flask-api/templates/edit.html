{% extends 'layout.html' %}

{% block title %}Editar producto{% endblock %}

{% block body %}
<div class="row justify-content-center">
  <div class="col-md-7 col-lg-5">
    {%- with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-warning alert-dismissible fade show shadow-sm" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
          </div>
        {% endfor %}
      {% endif %}
    {%- endwith %}

    <div class="card shadow-sm">
      <div class="card-header bg-white">
        <h1 class="h4 mb-0">Editar producto</h1>
      </div>
      <div class="card-body">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label" for="nombre">Nombre</label>
            <input type="text" id="nombre" name="nombre" value="{{ producto.nombre }}" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label" for="descripcion">Descripción</label>
            <input type="text" id="descripcion" name="descripcion" value="{{ producto.descripcion }}" class="form-control" required>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label" for="precio">Precio</label>
              <input type="number" id="precio" name="precio" value="{{ producto.precio }}" min="0" step="0.01" class="form-control" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label" for="stock">Existencias</label>
              <input type="number" id="stock" name="stock" value="{{ producto.stock }}" min="0" step="1" class="form-control" required>
            </div>
          </div>
          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-success">Actualizar producto</button>
            <a class="btn btn-outline-secondary" href="{{ url_for('Index') }}">Volver al inventario</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
